name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, Test & Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

  bundle-size:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Report bundle sizes
        run: |
          echo "## Bundle Sizes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | ESM | CJS | DTS |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|-----|-----|" >> $GITHUB_STEP_SUMMARY
          for pkg in core themes animations charts react; do
            esm=$(du -sh packages/$pkg/dist/index.js 2>/dev/null | cut -f1 || echo "—")
            cjs=$(du -sh packages/$pkg/dist/index.cjs 2>/dev/null | cut -f1 || echo "—")
            dts=$(du -sh packages/$pkg/dist/index.d.ts 2>/dev/null | cut -f1 || echo "—")
            echo "| @viskit/$pkg | $esm | $cjs | $dts |" >> $GITHUB_STEP_SUMMARY
          done
