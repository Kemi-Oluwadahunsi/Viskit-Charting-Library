name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, Test & Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

  bundle-size:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Report bundle sizes
        run: |
          human_size() {
            local bytes=$1
            if [ "$bytes" -ge 1048576 ]; then
              echo "$(awk "BEGIN {printf \"%.1f\", $bytes/1048576}")MB"
            elif [ "$bytes" -ge 1024 ]; then
              echo "$(awk "BEGIN {printf \"%.1f\", $bytes/1024}")KB"
            else
              echo "${bytes}B"
            fi
          }
          file_size() {
            if [ -f "$1" ]; then
              human_size "$(wc -c < "$1" | xargs)"
            else
              echo "—"
            fi
          }
          echo "## Bundle Sizes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | ESM | CJS | DTS |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|-----|-----|" >> $GITHUB_STEP_SUMMARY
          for pkg in core themes animations charts react; do
            esm=$(file_size "packages/$pkg/dist/index.js")
            cjs=$(file_size "packages/$pkg/dist/index.cjs")
            dts=$(file_size "packages/$pkg/dist/index.d.ts")
            echo "| @kodemaven/viskit-$pkg | $esm | $cjs | $dts |" >> $GITHUB_STEP_SUMMARY
          done
